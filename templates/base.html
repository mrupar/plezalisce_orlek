{% load static %}
<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Orlek Climbing{% endblock %}</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Theme -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f2937',
            accent: '#f59e0b'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- 🔝 NAVBAR -->
  <nav class="bg-primary text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      
      <h1 class="text-xl font-bold">Orlek Climbing</h1>

      <div class="space-x-6 hidden md:block">
        <a href="{% url 'home' %}" class="hover:text-accent">Domov</a>
        <a href="{% url 'routes' %}" class="hover:text-accent">Smeri</a>
      </div>

      <button id="menuBtn" class="md:hidden text-2xl">☰</button>
    </div>

    <!-- Mobile -->
    <div id="mobileMenu" class="hidden px-4 pb-4 md:hidden">
      <a href="{% url 'home' %}" class="block py-2">Domov</a>
      <a href="{% url 'routes' %}" class="block py-2">Smeri</a>
    </div>
  </nav>

  <!-- 📄 CONTENT -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}
    {% endblock %}
  </main>

  <!-- 🔻 FOOTER -->
  <footer class="bg-primary text-white mt-10">
    <div class="max-w-6xl mx-auto px-4 py-6 text-center text-sm">
      © 2026 Orlek Climbing
    </div>
  </footer>

  <!-- JS -->
  <script>
    const btn = document.getElementById('menuBtn');
    const menu = document.getElementById('mobileMenu');

    if (btn) {
      btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
      });
    }
  </script>

</body>
</html>
