<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orlek Climbing</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom theme -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f2937',   // dark gray
            accent: '#f59e0b'     // orange
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- 🔝 NAVBAR -->
  <nav class="bg-primary text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      
      <!-- Logo -->
      <h1 class="text-xl font-bold">Orlek Climbing</h1>

      <!-- Menu -->
      <div class="space-x-6 hidden md:block">
        <a href="index.html" class="hover:text-accent">Domov</a>
        <a href="area.html" class="hover:text-accent">Območje</a>
        <a href="routes.html" class="hover:text-accent">Smeri</a>
        <a href="about.html" class="hover:text-accent">Info</a>
      </div>

      <!-- Mobile menu button -->
      <button id="menuBtn" class="md:hidden text-2xl">
        ☰
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobileMenu" class="hidden px-4 pb-4 md:hidden">
      <a href="index.html" class="block py-2">Domov</a>
      <a href="area.html" class="block py-2">Območje</a>
      <a href="routes.html" class="block py-2">Smeri</a>
      <a href="about.html" class="block py-2">Info</a>
    </div>
  </nav>
  
<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- 🧭 HEADER -->
  <section class="mb-6">
    <h1 class="text-3xl md:text-4xl font-bold">Seznam smeri - Orlek</h1>
    <p class="text-gray-500">Izberi smer po sektorju ali težavnosti</p>
  </section>

  <!-- 🔍 FILTERS -->
  <section class="flex flex-col md:flex-row md:justify-between mb-8 gap-4">

    <!-- Sector filter -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Sektor</label>
      <select id="sectorFilter" class="border rounded-lg px-3 py-2">
        <option value="all">Vsi</option>
        <option value="Glavna stena">Glavna stena</option>
        <option value="Desni sektor">Desni sektor</option>
        <option value="Levi sektor">Levi sektor</option>
      </select>
    </div>

    <!-- Grade filter -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Težavnost</label>
      <select id="gradeFilter" class="border rounded-lg px-3 py-2">
        <option value="all">Vse</option>
        <option value="4a-5c">4a – 5c</option>
        <option value="6a-6c">6a – 6c</option>
        <option value="7a-7c">7a – 7c</option>
        <option value="8a+">8a+</option>
      </select>
    </div>

  </section>

  <!-- 🧱 ROUTES LIST -->
  <section id="routesList" class="grid md:grid-cols-3 gap-6">

    <!-- Route cards will be rendered here via JS -->

  </section>

</main>

 <!-- 🔻 FOOTER -->
  <footer class="bg-primary text-white mt-10">
    <div class="max-w-6xl mx-auto px-4 py-6 text-center text-sm">
      © 2026 Orlek Climbing | Vse pravice pridržane
    </div>
  </footer>

  <!-- JS -->
  <script>
    const btn = document.getElementById('menuBtn');
    const menu = document.getElementById('mobileMenu');

    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>

</body>
</html>
